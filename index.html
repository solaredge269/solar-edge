<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de Bord - Solar Edge</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background-color: #121212; /* fond noir */
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.dashboard {
    text-align: center;
}

h1 {
    margin-bottom: 50px;
    color: #ff7b00;
}

button {
    display: block;
    width: 200px;
    padding: 20px;
    margin: 20px auto;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background-color: #ff7b00;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #e56e00;
    transform: scale(1.05);
}
</style>
</head>
<body>

<div class="dashboard">
    <h1>Solar Edge - Menu Principal</h1>
    <button onclick="openPage('fact.html')">📄 Facture</button>
    <button onclick="openPage('charge-client .html')">💰 Charges</button>
    <button onclick="openPage('fournisseur.html')">🛒 Achat</button>
    <button onclick="openPage('VENTE.HTML')">💼 Vente</button>
</div>

<script>
function openPage(page) {
    window.location.href = page; // ouvre la page liée
}
</script>

</body>
</html>
